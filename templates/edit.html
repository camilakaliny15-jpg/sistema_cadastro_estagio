{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Manutenção de Instituição</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Nome Oficial</label>
                            <input type="text" name="nome_oficial" class="form-control" value="{{ instituicao.nome_oficial if instituicao else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">CNPJ</label>
                            <input type="text" name="cnpj" class="form-control" value="{{ instituicao.cnpj if instituicao else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email Oficial</label>
                            <input type="email" name="email_oficial" class="form-control" value="{{ instituicao.email_oficial if instituicao else '' }}">
                        </div>
                    </div>
                    <div class="mt-4 d-flex justify-content-between">
                        <a href="/" class="btn btn-secondary">Voltar</a>
                        <button type="submit" class="btn btn-success px-5">Salvar Registro</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
