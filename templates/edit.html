{% extends "base.html" %}

{% block title %}Editar Pessoa - {{ super() }}{% endblock %}

{% block content %}
    <h2>Editar Pessoa: {{ pessoa.nome }}</h2>
    
    <form method="POST" action="{{ url_for('edit', id=pessoa.id) }}">
        <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" value="{{ pessoa.nome }}" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ pessoa.email }}">
        </div>
        <div>
            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" name="telefone" value="{{ pessoa.telefone }}">
        </div>
        <div>
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" value="{{ pessoa.endereco }}">
        </div>
        
        <button type="submit">Salvar Alterações</button>
        <a href="{{ url_for('index') }}">Cancelar</a>
    </form>
{% endblock %}
