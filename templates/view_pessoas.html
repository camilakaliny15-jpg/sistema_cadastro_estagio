{% extends 'base.html' %}
{% block content %}
<h2>Detalhes: {{ pessoa.nome }}</h2>
<p><strong>Email:</strong> {{ pessoa.email }}</p>
<p><strong>Telefone:</strong> {{ pessoa.telefone }}</p>
<p><strong>Endereço:</strong> {{ pessoa.endereco }}</p>
<p><strong>Cargo:</strong> {{ pessoa.cargo }}</p>
<p><strong>Instagram:</strong> {{ pessoa.instagram }}</p>
<p><strong>Observação:</strong> {{ pessoa.observacao }}</p>
<hr>
<a href="/pessoas" class="btn btn-outline-danger">Voltar</a>
{% endblock %}
