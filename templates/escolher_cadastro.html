{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
        <h2 class="mb-5">O que você deseja cadastrar?</h2>
        <div class="row">
            <div class="col-md-6 mb-3">
                <a href="/add" class="card shadow-sm p-5 text-decoration-none border-danger h-100 d-flex flex-column align-items-center justify-content-center hover-card">
                    <h3 class="text-danger">Instituição</h3>
                    <p class="text-muted small">Bibliotecas, Escolas, etc.</p>
                </a>
            </div>
            <div class="col-md-6 mb-3">
                <a href="/pessoas/add" class="card shadow-sm p-5 text-decoration-none border-dark h-100 d-flex flex-column align-items-center justify-content-center hover-card">
                    <h3 class="text-dark">Pessoa</h3>
                    <p class="text-muted small">Contatos, Diretores, etc.</p>
                </a>
            </div>
        </div>
        <div class="mt-4">
            <a href="/" class="btn btn-secondary">Voltar ao Início</a>
        </div>
    </div>
</div>
{% endblock %}
