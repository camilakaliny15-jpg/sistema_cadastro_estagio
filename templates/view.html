{% extends 'base.html' %}

{% block content %}
<h2>Detalhes da Instituição</h2>

<div class="detalhes-container" style="border: 1px solid #ccc; padding: 20px;">
    <h3>{{ instituicao.nome_oficial }}</h3>
    <hr>
    
    <p><strong>ID:</strong> {{ instituicao.id }}</p>
    <p><strong>Status:</strong> 
        <span style="color: {% if instituicao.status == 'Ativo' %}green{% else %}red{% endif %};">
            {{ instituicao.status }}
        </span>
    </p>
</div>

<br>
<a href="/">Voltar</a>
{% endblock %}
